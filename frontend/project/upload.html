<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Valid ID</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #eef0fb;
            --card-bg: #ffffff;
            --ink: #1a1f3a;
            --muted: #6f7695;
            --line: #d7dbef;
            --accent: #4f65ff;
            --accent-light: #e8ebff;
            --accent-strong: #3448d4;
            --good: #12844d;
            --bad: #c1283d;
            --sidebar-w: 220px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background:
                radial-gradient(circle at 8% 10%, #d9deff 0, transparent 35%),
                radial-gradient(circle at 92% 92%, #e3e7ff 0, transparent 40%),
                var(--bg-main);
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--card-bg);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            padding: 22px 16px;
            position: relative;
            transition: width .25s ease, padding .25s ease;
            flex-shrink: 0;
            z-index: 10;
        }


        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .brand img { width: 80px; height: 80px; object-fit: contain; }
        .brand-label { font-size: .7rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

        .menu-label {
            font-size: .95rem;
            font-weight: 700;
            color: var(--ink);
            margin: 14px 0 10px;
        }

        .nav-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            color: var(--ink);
            font-size: .93rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background .15s;
        }
        .nav-item:hover, .nav-item.active { background: var(--accent-light); color: var(--accent); }
        .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

        .sidebar-spacer { flex: 1; }

        .sidebar-bottom { display: flex; flex-direction: column; gap: 4px; border-top: 1px solid var(--line); padding-top: 14px; }

        .welcome-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 18px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: default;
        }
        .welcome-box .avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: .85rem;
            flex-shrink: 0;
        }
        .welcome-info { overflow: hidden; }
        .welcome-label { font-size: .75rem; color: var(--muted); }
        .welcome-name { font-size: .93rem; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .welcome-arrow { margin-left: auto; color: var(--muted); font-size: 14px; }

        /* ── MAIN ── */
        .main {
            flex: 1;
            padding: 36px 42px;
            overflow-y: auto;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.65rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 28px;
        }
        .page-title svg { width: 28px; height: 28px; color: var(--ink); }

        /* ── DROP ZONE ── */
        .upload-card {
            background: var(--card-bg);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 8px 28px rgba(43, 57, 148, .08);
        }

        .dropzone {
            border: 2px dashed var(--line);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 44px 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
        }
        .dropzone.dragover { border-color: var(--accent); background: var(--accent-light); }
        .dropzone svg.upload-icon { width: 48px; height: 48px; color: var(--muted); margin-bottom: 12px; }
        .dropzone-text { font-size: .95rem; color: var(--muted); }
        .dropzone-or { font-size: .85rem; color: var(--muted); margin: 6px 0; }

        /* Dropzone thumbnail preview */
        .dropzone-preview { display: none; flex-direction: column; align-items: center; gap: 10px; }
        .dropzone-preview img { max-height: 180px; max-width: 100%; border-radius: 10px; border: 1px solid var(--line); object-fit: contain; }
        .dropzone-preview .file-info { font-size: .85rem; color: var(--muted); }
        .dropzone-preview .change-btn {
            font-size: .82rem; color: var(--accent); background: none; border: none;
            cursor: pointer; font-family: inherit; font-weight: 600; text-decoration: underline;
        }
        .dropzone.has-preview .dropzone-default { display: none; }
        .dropzone.has-preview .dropzone-preview { display: flex; }
        .dropzone.has-preview { padding: 24px; }

        .browse-btn {
            display: inline-block;
            padding: 8px 22px;
            border: 1.5px solid var(--accent);
            border-radius: 8px;
            background: #fff;
            color: var(--accent);
            font-family: inherit;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, color .15s;
        }
        .browse-btn:hover { background: var(--accent); color: #fff; }

        #idFront { display: none; }

        /* ── MESSAGE / RESULT ── */
        /* Spinner */
        .spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .spinner {
            width: 22px; height: 22px;
            border: 3px solid var(--line);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #message {
            min-height: 24px;
            margin: 16px 0 4px;
            text-align: center;
            font-weight: 600;
            color: var(--muted);
        }
        #result {
            display: none;
            text-align: center;
            margin: 12px 0;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: #f8f9ff;
        }
        .ok  { color: var(--good); }
        .bad { color: var(--bad); }

        .submit-btn {
            width: 100%;
            margin-top: 18px;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, var(--accent), #6b7eff);
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
            display: none;          /* shown after file chosen */
        }
        .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(79,101,255,.35); }

        /* ── RESULT MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(20, 24, 56, .45);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 32px;
            width: min(420px, 92vw);
            box-shadow: 0 20px 50px rgba(30, 40, 120, .25);
            text-align: center;
            position: relative;
            animation: modalIn .25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(24px) scale(.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-close {
            position: absolute;
            top: 14px; right: 16px;
            background: none; border: none;
            font-size: 1.3rem; color: var(--muted);
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover { color: var(--ink); }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 18px;
        }

        .modal img {
            max-height: 220px;
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid var(--line);
            box-shadow: 0 4px 14px rgba(53,68,165,.12);
            object-fit: contain;
            margin-bottom: 16px;
        }

        .modal .pill {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 999px;
            font-size: .95rem;
            font-weight: 700;
        }
        .pill.real { color: var(--good); background: #e8f7ee; }
        .pill.fake { color: var(--bad); background: #fdecef; }
        .pill.other { color: #856404; background: #fff3cd; }

        .modal-confidence { font-size: .88rem; color: var(--muted); margin-top: 8px; }

        .modal-btn {
            margin-top: 20px;
            padding: 11px 28px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--accent), #6b7eff);
            color: #fff;
            font-family: inherit;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
        }
        .modal-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(79,101,255,.3); }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; height: 100vh; box-shadow: 4px 0 20px rgba(0,0,0,.1); }
            .sidebar.collapsed { width: 0; }
            .main { padding: 24px 18px; }
            .recent-card { flex-direction: column; align-items: center; }
            .recent-card img { width: 160px; }
        }
    </style>
</head>

<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
    <div class="brand">
        <img src="imgs/dino.png" alt="Cuatro">
    </div>
    <hr style="border:none; border-top:1px solid var(--line); margin:10px 0;">

    <p class="menu-label">Menu</p>
    <ul class="nav-list">
        <li>
            <a class="nav-item active" href="history.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                History
            </a>
        </li>
    </ul>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-bottom">
        <a class="nav-item" onclick="logout()" style="cursor:pointer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Log out
        </a>
    </div>

    <div class="welcome-box">
        <div class="avatar" id="avatarInitial">U</div>
        <div class="welcome-info">
            <div class="welcome-label">Welcome back</div>
            <div class="welcome-name" id="welcomeUser">User</div>
        </div>
        <span class="welcome-arrow">›</span>
    </div>
</aside>

<!-- ── MAIN CONTENT ── -->
<main class="main">

    <div class="page-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Area
    </div>

    <form id="uploadForm" enctype="multipart/form-data">
        <div class="upload-card">
            <div class="dropzone" id="dropzone">
                <div class="dropzone-default">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V3m0 0l4 4m-4-4L8 7"/><path d="M2 17l.621 2.485A2 2 0 0 0 4.561 21h14.878a2 2 0 0 0 1.94-1.515L22 17"/></svg>
                    <p class="dropzone-text">Drag&amp;Drop files here</p>
                    <p class="dropzone-or">or</p>
                    <label class="browse-btn" for="idFront">Browse Files</label>
                </div>
                <div class="dropzone-preview">
                    <img id="dropzoneThumb" alt="Preview">
                    <span class="file-info" id="fileInfo"></span>
                    <label class="change-btn" for="idFront">Change file</label>
                </div>
            </div>
            <input type="file" id="idFront" accept="image/*" required>

            <div id="message"></div>
            <div id="result"></div>
            <button class="submit-btn" id="submitBtn" type="submit">Submit ID</button>
        </div>
    </form>

</main>

<!-- ── RESULT POPUP ── -->
<div class="modal-overlay" id="resultModal">
    <div class="modal">
        <button class="modal-close" id="modalClose" type="button">&times;</button>
        <h3 class="modal-title">Verification Result</h3>
        <img id="previewFront" alt="Uploaded ID">
        <div><span class="pill" id="recentPill"></span></div>
        <p class="modal-confidence" id="recentConf"></p>
        <button class="modal-btn" id="modalDone" type="button">Done</button>
    </div>
</div>

<script src="config.js"></script>
<script>
    /* ── Auth guard ── */
    function logout() {
        sessionStorage.clear();
        window.location.href = 'login.html';
    }

    const PYTHON_API = API_BASE;
    const username = sessionStorage.getItem('username');
    if (!username) window.location.href = 'login.html';

    document.getElementById('welcomeUser').textContent = username;
    document.getElementById('avatarInitial').textContent = username.charAt(0).toUpperCase();

    /* ── Drag & Drop ── */
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('idFront');
    let idFrontData = null;

    ['dragenter','dragover'].forEach(evt => {
        dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    });
    ['dragleave','drop'].forEach(evt => {
        dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.remove('dragover'); });
    });
    dropzone.addEventListener('drop', e => {
        const dt = e.dataTransfer;
        if (dt.files.length) { fileInput.files = dt.files; handleFile(dt.files[0]); }
    });

    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
            idFrontData = reader.result;

            /* Dropzone inline preview */
            document.getElementById('dropzoneThumb').src = idFrontData;
            const sizeMB = (file.size / 1024 / 1024).toFixed(2);
            document.getElementById('fileInfo').textContent = file.name + ' \u2014 ' + sizeMB + ' MB';
            dropzone.classList.add('has-preview');

            /* Prepare modal preview image */
            document.getElementById('previewFront').src = idFrontData;
            document.getElementById('submitBtn').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    /* ── Submit ── */
    document.getElementById('uploadForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const messageDiv = document.getElementById('message');
        const resultDiv  = document.getElementById('result');
        messageDiv.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><span>Analyzing...</span></div>';

        try {
            const aiResponse = await fetch(`${PYTHON_API}/api/predict`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idFront: idFrontData })
            });
            const aiData = await aiResponse.json();

            if (!aiData.success) { messageDiv.textContent = 'AI failed'; return; }

            const prediction  = aiData.prediction;
            const confidence  = aiData.confidence;

            await fetch(`${PYTHON_API}/api/save-upload`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, image: idFrontData, result: prediction })
            });

            messageDiv.textContent = '';
            resultDiv.style.display = 'block';

            if (prediction === 'REAL ID') {
                resultDiv.innerHTML = '<h3 class="ok">REAL ID</h3>';
            } else if (prediction === 'FAKE ID') {
                resultDiv.innerHTML = '<h3 class="bad">FAKE ID</h3>';
            } else {
                resultDiv.innerHTML = '<h3 class="bad">NOT A VALID ID</h3>';
            }

            /* Update modal pill & open popup */
            const pill = document.getElementById('recentPill');
            pill.textContent = prediction;
            pill.className = 'pill ' + (prediction === 'REAL ID' ? 'real' : prediction === 'FAKE ID' ? 'fake' : 'other');
            if (confidence != null) {
                document.getElementById('recentConf').textContent = 'Confidence: ' + (confidence * 100).toFixed(1) + '%';
            }
            document.getElementById('resultModal').classList.add('open');

        } catch (err) {
            messageDiv.textContent = 'Server Error: ' + err.message;
        }
    });

    /* ── Modal close ── */
    function closeModal() { document.getElementById('resultModal').classList.remove('open'); }
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalDone').addEventListener('click', closeModal);
    document.getElementById('resultModal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
    });
</script>

</body>

</html>
