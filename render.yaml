databases:
  - name: cuatro-db
    plan: free
    databaseName: cuatro
    user: cuatro

services:
  # Backend API
  - type: web
    name: cuatro-api
    runtime: python
    plan: starter
    buildCommand: ./build.sh
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cuatro-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"

  # Frontend static site
  - type: static
    name: cuatro-frontend
    plan: starter
    buildCommand: echo "Static site, no build needed"
    staticPublishPath: frontend/project
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
