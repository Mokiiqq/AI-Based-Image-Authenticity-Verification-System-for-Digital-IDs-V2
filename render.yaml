databases:
  - name: cuatro-db
    plan: free
    databaseName: cuatro
    user: cuatro

services:
  - type: web
    name: cuatro-api
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cuatro-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"
